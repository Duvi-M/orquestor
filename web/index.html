<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Computer Use Orchestrator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>Computer Use Orchestrator</h1>
      <p>FastAPI sessions, worker SSE events, and noVNC screen access.</p>
    </div>
    <button id="create-session">New Session</button>
  </header>

  <main>
    <aside>
      <div class="section-title">Sessions</div>
      <div id="sessions"></div>
    </aside>

    <section class="workspace">
      <div class="toolbar">
        <div>
          <div class="label">Active Session</div>
          <div id="active-session">None</div>
        </div>
        <div class="toolbar-actions">
          <button id="load-history" disabled>History</button>
          <a id="novnc-link" class="button secondary disabled" href="#" target="_blank" rel="noreferrer">Open noVNC</a>
        </div>
      </div>

      <div id="events" class="events"></div>

      <form id="message-form" class="composer">
        <input id="message" placeholder="Ask the agent to use the computer..." autocomplete="off" disabled />
        <button id="send" type="submit" disabled>Send</button>
      </form>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
