services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    image: computer-use-orchestrator:local
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      ORCHESTRATOR_API_TOKEN: ${ORCHESTRATOR_API_TOKEN:-}
      COMPUTER_USE_DB_PATH: /app/data/orchestrator.db
      PUBLIC_HOST: 127.0.0.1
      WORKER_CONNECT_HOST: host.docker.internal
      WORKER_IMAGE: ${WORKER_IMAGE:-computer-use-demo:local}
      MODEL: ${MODEL:-claude-sonnet-4-5-20250929}
      TOOL_VERSION: ${TOOL_VERSION:-computer_use_20250124}
      MAX_TOKENS: ${MAX_TOKENS:-4096}
      ENABLE_STREAMLIT: ${ENABLE_STREAMLIT:-false}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://[::]:5173}
      CLEANUP_ORPHAN_WORKERS_ON_STARTUP: ${CLEANUP_ORPHAN_WORKERS_ON_STARTUP:-false}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-300}
      CLEANUP_EVERY_SECONDS: ${CLEANUP_EVERY_SECONDS:-30}
      WORKER_READY_TIMEOUT_SECONDS: ${WORKER_READY_TIMEOUT_SECONDS:-25.0}
      WORKER_READY_POLL_SECONDS: ${WORKER_READY_POLL_SECONDS:-0.5}
      WORKER_STATUS_POLL_SECONDS: ${WORKER_STATUS_POLL_SECONDS:-2.0}
      SSE_RETRY_LIMIT: ${SSE_RETRY_LIMIT:-3}
      SSE_RETRY_INITIAL_BACKOFF_SECONDS: ${SSE_RETRY_INITIAL_BACKOFF_SECONDS:-0.25}
      SSE_RETRY_MAX_BACKOFF_SECONDS: ${SSE_RETRY_MAX_BACKOFF_SECONDS:-3.0}
      WORKER_CPU_LIMIT: ${WORKER_CPU_LIMIT:-1.0}
      WORKER_MEMORY_LIMIT: ${WORKER_MEMORY_LIMIT:-2g}
      WORKER_PIDS_LIMIT: ${WORKER_PIDS_LIMIT:-512}
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "5173:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - orchestrator
